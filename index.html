<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurfProwlv2</title>

    <!-- <link rel="manifest" href="manifest.json"> -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- There are three main pages: setup page, view the houses on a street, interact with a house -->

    <section id="welcome">
        <header class="banner">
            <h1>Turf Prowler</h1>
            <h3>Prowl your turf like a pro</h3>
        </header>
        <button id="getStarted">Get Started</button>
    </section>

    <section id="chooseArea">
        <header class="banner">
            <h2>Choose your area</h2>
        </header>
        <form autocomplete="off" autocapitalize="word">
            <input type="text" name="setSuburb" id="setSuburb" placeholder="Suburb" autocomplete="off"
                autocapitalize="word">
            <input type="number" name="setPostCode" id="setPostCode" placeholder="Postcode" autocomplete="off">
            <input type="submit" value="Next">
        </form>
    </section>

    <section id="editStreets">
        <header class="banner">
            <h2>Edit Streets</h2>
        </header>
        <form autocomplete="off" autocapitalize="word">
            <input type="text" name="street" id="street" autocomplete="off" autocapitalize="word">
            <input type="submit" value="+">
        </form>
        <ul>
            <!-- Streets are added here in the format: <li><span>John Street<span><button>Delete</button></li> -->
        </ul>
        <button id="start">Next</button>
    </section>

    <section id="streetView">
        <header class="banner">
            <h2 id="area"></h2>
            <button id="manualChooseArea">Change Area</button>
            <button id="manualEditStreets">Edit Streets</button>
            <button id="reset">Reset</button>
        </header>
        <div id="selectStreet">
            <!-- Streets are added here as buttons, and clicking on them sets the current street -->
        </div>
        <div id="selectHouse">
            <!-- Houses are added here as buttons, and clicking on them takes you to the corresponding page to edit the house -->
        </div>
    </section>

    <section id="editHouse">
        <header class="banner">
            <h1 id="addressLine1"></h1>
            <h3 id="addressLine2"></h3>
        </header>
        <table>
            <thead>
                <tr>
                    <th>Knocks</th>
                    <th>Contacts</th>
                    <th>Reknock?</th>
                    <th>Qualified?</th>
                    <th>Booked?</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="infoKnocks"></td>
                    <td id="infoContacts"></td>
                    <td id="infoReknock"></td>
                    <td id="infoQualified"></td>
                    <td id="infoBooked"></td>
                </tr>
            </tbody>
        </table>
        <div id="actions">
            <button id="knock">Knock</button>
            <button id="contact">Contact</button>
            <button id="toggleReknock">Reknock</button>
            <button id="toggleQualified">Qualify</button>
            <button id="toggleBooked">Book</button>
        </div>
        <button id="back">Back</button>
        <form autocomplete="off" autocapitalize="sentence">
            <textarea name="notes" id="notes" placeholder="Notes..."></textarea>
        </form>
    </section>

    <!-- <script>
        if (typeof navigator.serviceWorker !== "undefined")
            navigator.serviceWorker.register("sw.js")
    </script> -->

    <script src="js/data.js"></script>
    <script src="js/editStreets.js"></script>
    <script src="js/streetView.js"></script>
    <script src="js/editHouse.js"></script>
    <script src="js/pages.js"></script>
    <script>
        document.querySelector("#getStarted").addEventListener("click", (_event) => {
            document.documentElement.requestFullscreen().catch((error) => console.error(error));
            loadPage(pages.chooseArea);
        });

        document.querySelector("#chooseArea form").addEventListener("submit", (event) => {
            event.preventDefault();

            const fd = new FormData(event.target);
            const obj = Object.fromEntries(fd.entries());

            if (obj.setSuburb && obj.setPostCode) {
                setSuburb(obj.setSuburb);
                setPostCode(obj.setPostCode);

                loadPage(pages.editStreets);
                document.querySelector("#chooseArea form").reset();
            }
        });

        document.querySelector("#editStreets form").addEventListener("submit", (event) => {
            event.preventDefault();

            const fd = new FormData(event.target);
            const obj = Object.fromEntries(fd.entries());

            if (!obj.street) {
                return;
            }

            const streets = getStreets();

            if (!streets.includes(obj.street)) {
                setStreets([obj.street, ...streets]);
                renderEditableStreets();
            }

            document.querySelector("#editStreets form").reset();
        });

        document.querySelector("#start").addEventListener("click", (_event) => {
            const streets = getStreets();

            if (streets.length !== 0) {
                setCurrentStreet(streets[0]);
                loadPage(pages.streetView);
            }
        });

        document.querySelector("#manualChooseArea").addEventListener("click", (_event) => {
            loadPage(pages.chooseArea);
        });

        document.querySelector("#manualEditStreets").addEventListener("click", (_event) => {
            loadPage(pages.editStreets);
        });

        document.querySelector("#reset").addEventListener("click", (_event) => {
            clearData();
        });

        document.querySelector("#back").addEventListener("click", (_event) => {
            clearCurrentNo();
            loadPage(pages.streetView);
        })

        document.querySelector("#notes").addEventListener("input", (event) => {
            setNotes(event.target.value);
        });
    </script>
</body>

</html>
